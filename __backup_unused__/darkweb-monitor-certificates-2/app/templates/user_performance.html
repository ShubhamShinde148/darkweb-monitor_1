<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>User Performance</title>
</head>
<body>
    <div class="container">
        <h1>User Performance Metrics</h1>
        <table>
            <thead>
                <tr>
                    <th>User</th>
                    <th>Total Certificates Issued</th>
                    <th>Verification Success Rate</th>
                    <th>Last Active</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.certificates_issued }}</td>
                    <td>{{ user.verification_success_rate }}%</td>
                    <td>{{ user.last_active }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
