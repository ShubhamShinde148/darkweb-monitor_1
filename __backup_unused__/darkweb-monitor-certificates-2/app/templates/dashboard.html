<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <title>User Dashboard</title>
</head>
<body>
    <div class="container">
        <h1>Your Certificates</h1>
        <table>
            <thead>
                <tr>
                    <th>Certificate ID</th>
                    <th>Issued Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for certificate in certificates %}
                <tr>
                    <td>{{ certificate.id }}</td>
                    <td>{{ certificate.issued_date }}</td>
                    <td>{{ certificate.status }}</td>
                    <td>
                        <a href="{{ url_for('verify_certificate', certificate_id=certificate.id) }}">Verify</a>
                        <a href="{{ url_for('download_certificate', certificate_id=certificate.id) }}">Download</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</body>
</html>
